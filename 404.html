<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#034D32">
<title>404 — Margo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23034D32'/><text y='78' font-size='72' x='50' text-anchor='middle' font-family='Georgia,serif' fill='%23028454' font-style='italic'>m</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Lora:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F9F9F9;
  --ink: #034D32;
  --ink-muted: #2E6B52;
  --ink-faint: #5A8C76;
  --accent: #028454;
  --accent-bg: #E4F3EE;
  --border: #C0DDD4;
  --font-display: 'Fraunces', Georgia, serif;
  --font-ui: 'Lora', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg); color: var(--ink);
  font-family: var(--font-ui); -webkit-font-smoothing: antialiased;
  display: flex; align-items: center; justify-content: center;
}
.wrap { text-align: center; padding: 24px; }
.num {
  font-family: var(--font-display); font-size: 120px; line-height: 1;
  color: var(--ink); font-style: italic; opacity: 0.12;
  margin-bottom: 0px;
}
.title {
  font-family: var(--font-display); font-size: 28px;
  color: var(--ink); margin-bottom: 12px;
}
.sub {
  font-size: 15px; color: var(--ink-muted); line-height: 1.7;
  margin-bottom: 32px;
}
.home-btn {
  display: inline-block; padding: 13px 28px;
  background: var(--ink); color: #fff; border-radius: 8px;
  font-family: var(--font-ui); font-size: 14px; font-weight: 500;
  text-decoration: none; transition: background 0.14s;
}
.home-btn:hover { background: var(--accent); }
.wordmark {
  font-family: var(--font-display); font-size: 18px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--ink-faint); margin-top: 40px; display: block;
}
.wordmark em { color: var(--accent); font-style: normal; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <div class="title">Page not found</div>
    <p class="sub">This page doesn't exist — but your fastest font does.</p>
    <a href="https://margo.fyi" class="home-btn">Find your font →</a>
    <span class="wordmark">M<em>a</em>rgo</span>
  </div>
</body>
</html>
